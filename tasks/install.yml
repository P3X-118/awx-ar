---
- name: Configure AWX postgres database
  ansible.builtin.set_fact:
    postgres_managed_databases_additional: "{{ postgres_managed_databases_additional | default([]) + awx_postgres_managed_databases }}"

- name: Ensure AWX paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"
  with_items:
    - "{{ awx_base_path }}"
    - "{{ awx_projects_storage_path }}"

- name: Generate AWX secret key
  when: awx_secret_key | default('') | length == 0
  ansible.builtin.set_fact:
    awx_generated_secret_key: "{{ lookup('community.general.random_string', length=50, special=false) }}"

- name: Write AWX secret key to file
  when: awx_secret_key | default('') | length == 0
  ansible.builtin.copy:
    dest: "{{ awx_secret_key_file }}"
    content: "{{ awx_secret_key | default(awx_generated_secret_key) }}"
    mode: "0640"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"

- name: Generate AWX broadcast websocket secret
  when: awx_broadcast_websocket_secret | default('') | length == 0
  ansible.builtin.set_fact:
    awx_generated_broadcast_websocket_secret: "{{ lookup('community.general.random_string', length=50, special=false) }}"

- name: Write AWX broadcast websocket secret to file
  when: awx_broadcast_websocket_secret | default('') | length == 0
  ansible.builtin.copy:
    dest: "{{ awx_broadcast_websocket_secret_file }}"
    content: "{{ awx_broadcast_websocket_secret | default(awx_generated_broadcast_websocket_secret) }}"
    mode: "0640"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"

- name: Set AWX secrets facts
  ansible.builtin.set_fact:
    awx_effective_secret_key: "{{ awx_secret_key if awx_secret_key | default('') | length > 0 else awx_generated_secret_key }}"
    awx_effective_broadcast_websocket_secret: "{{ awx_broadcast_websocket_secret if awx_broadcast_websocket_secret | default('') | length > 0 else awx_generated_broadcast_websocket_secret }}"

- name: Ensure AWX environment file is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/env.j2"
    dest: "{{ awx_base_path }}/env"
    mode: "0640"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"
  register: awx_support_files_result

- name: Ensure AWX container image is pulled via community.docker.docker_image
  when: sysd_docker_image_pull_method == 'ansible-module'
  community.docker.docker_image:
    name: "{{ awx_container_image }}"
    source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
    force_source: "{{ awx_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
  register: awx_container_image_pull_result
  retries: "{{ container_retry_delay }}"
  delay: "{{ container_retry }}"
  until: awx_container_image_pull_result is not failed

- name: Ensure AWX container image is pulled via ansible.builtin.command
  when: sysd_docker_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ sysd_docker_host_command }} pull {{ awx_container_image }}"
  register: awx_container_image_pull_result
  retries: "{{ container_retry_delay }}"
  delay: "{{ container_retry }}"
  until: awx_container_image_pull_result is not failed
  changed_when: "'Downloaded newer image' in awx_container_image_pull_result.stdout"

- name: Ensure AWX container network is created via community.docker.docker_network
  when: sysd_docker_net_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ sysd_docker_ipv6_enabled }}"
    name: "{{ awx_container_network }}"
    driver: bridge
    driver_options: "{{ sysd_docker_net_driver_opts }}"
  register: awx_network_creation_result

- name: Ensure AWX container network is created via ansible.builtin.command
  when: sysd_docker_net_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ sysd_docker_host_command }} network create
      {% if sysd_docker_ipv6_enabled %}--ipv6{% endif %}
      {{ sysd_docker_net_driver_opts_string }}
      {{ awx_container_network }}
  register: awx_network_creation_result
  changed_when: awx_network_creation_result.rc == 0
  failed_when: awx_network_creation_result.rc != 0 and 'already exists' not in awx_network_creation_result.stderr

- name: Ensure AWX projects volume exists
  ansible.builtin.file:
    path: "{{ awx_projects_storage_path }}"
    state: directory
    mode: "0750"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"

- name: Ensure AWX data volume exists
  ansible.builtin.file:
    path: "{{ awx_data_path }}"
    state: directory
    mode: "0750"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"

- name: Ensure AWX config directories exist
  ansible.builtin.file:
    path: "{{ awx_base_path }}/tower"
    state: directory
    mode: "0750"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"

- name: Ensure AWX supervisor directory exists
  ansible.builtin.file:
    path: "{{ awx_base_path }}/supervisor"
    state: directory
    mode: "0750"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"

- name: Ensure AWX settings file is present
  ansible.builtin.copy:
    dest: "{{ awx_base_path }}/tower/settings.py"
    content: |
      # AWX Settings - configured via environment variables
      import os

      ALLOWED_HOSTS = [os.environ.get("AWX_HOST", "*")]

      DATABASES = {
          'default': {
              'ENGINE': 'django.db.backends.postgresql',
              'NAME': os.environ.get('DATABASE_NAME', 'awx'),
              'USER': os.environ.get('DATABASE_USER', 'awx'),
              'PASSWORD': os.environ.get('DATABASE_PASSWORD', ''),
              'HOST': os.environ.get('DATABASE_HOST', 'localhost'),
              'PORT': os.environ.get('DATABASE_PORT', '5432'),
          }
      }

      _redis_host = os.environ.get('REDIS_HOST', 'localhost')
      _redis_port = os.environ.get('REDIS_PORT', '6379')
      _redis_password = os.environ.get('REDIS_PASSWORD', '')
      _redis_auth = f':{_redis_password}@' if _redis_password else ''

      BROKER_URL = f'redis://{_redis_auth}{_redis_host}:{_redis_port}/0'
      CACHES = {
          'default': {
              'BACKEND': 'awx.main.cache.AWXRedisCache',
              'LOCATION': f'redis://{_redis_auth}{_redis_host}:{_redis_port}/1',
          }
      }
      CHANNEL_LAYERS = {
          'default': {
              'BACKEND': 'channels_redis.core.RedisChannelLayer',
              'CONFIG': {'hosts': [BROKER_URL], 'capacity': 10000, 'group_expiry': 157784760},
          }
      }
    mode: "0644"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"

- name: Ensure AWX nginx config is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/nginx.conf.j2"
    dest: "{{ awx_base_path }}/nginx.conf"
    mode: "0644"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"
  register: awx_nginx_result

- name: Ensure AWX labels file is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/labels.j2"
    dest: "{{ awx_base_path }}/labels"
    mode: "0640"
    owner: "{{ awx_uid }}"
    group: "{{ awx_gid }}"
  register: awx_labels_result

- name: Ensure AWX systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/awx.service.j2"
    dest: "{{ sysd_docker_service_path }}/{{ awx_identifier }}.service"
    mode: "0644"
  register: awx_systemd_service_result

- name: Ensure AWX receptor systemd service is present
  when: awx_receptor_enabled | bool
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/awx-receptor.service.j2"
    dest: "{{ sysd_docker_service_path }}/{{ awx_receptor_identifier }}.service"
    mode: "0644"
  register: awx_receptor_systemd_service_result

- name: Determine whether AWX needs a restart
  ansible.builtin.set_fact:
    awx_restart_necessary: >-
      {{
        awx_support_files_result.changed | default(false)
        or awx_nginx_result.changed | default(false)
        or awx_labels_result.changed | default(false)
        or awx_systemd_service_result.changed | default(false)
        or awx_receptor_systemd_service_result.changed | default(false)
        or awx_container_image_pull_result.changed | default(false)
      }}

- name: Migrate AWX database
  ansible.builtin.command:
    cmd: >
      {{ sysd_docker_host_command }} run --rm
      --env-file={{ awx_base_path }}/env
      --network={{ awx_postgres_container_network | default(postgres_container_network) }}
      --volume={{ awx_base_path }}/tower/settings.py:/etc/tower/settings.py:ro
      {{ awx_container_image }}
      awx-manage migrate --no-input
  register: awx_migrate_result
  changed_when: "'OK' in awx_migrate_result.stdout or awx_migrate_result.rc == 0"
  failed_when: awx_migrate_result.rc != 0 and 'Relation' not in awx_migrate_result.stderr
  when: awx_enabled | bool

- name: Ensure AWX admin user exists
  ansible.builtin.command:
    cmd: >
      {{ sysd_docker_host_command }} run --rm
      --env-file={{ awx_base_path }}/env
      --network={{ awx_postgres_container_network | default(postgres_container_network) }}
      --volume={{ awx_base_path }}/tower/settings.py:/etc/tower/settings.py:ro
      {{ awx_container_image }}
      awx-manage shell -c "from django.contrib.auth.models import User; import os; username = os.environ.get('AWX_ADMIN_USER', 'admin'); password = os.environ.get('AWX_ADMIN_PASSWORD', ''); User.objects.get_or_create(username=username, defaults={'is_superuser': True, 'is_staff': True})[0].set_password(password) or User.objects.get(username=username); print('done')"
  register: awx_admin_user_result
  changed_when: "'done' in awx_admin_user_result.stdout"
  failed_when: awx_admin_user_result.rc != 0
  when: awx_enabled | bool

- name: Ensure AWX preload data exists
  ansible.builtin.command:
    cmd: >-
      {{ sysd_docker_host_command }} run --rm
      --env-file={{ awx_base_path }}/env
      --network={{ awx_postgres_container_network | default(postgres_container_network) }}
      --volume={{ awx_base_path }}/tower/settings.py:/etc/tower/settings.py:ro
      {{ awx_container_image }}
      awx-manage create_preload_data
  register: awx_create_preload_result
  changed_when: "'changed: True' in awx_create_preload_result.stdout"
  failed_when: awx_create_preload_result.rc != 0
  when: awx_enabled | bool
